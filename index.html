<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina · Agence Web Bénin — Création Site Web Professionnel</title>
  <meta name="description"
    content="Lumina, agence digitale premium à Cotonou. Création de sites web sur-mesure qui convertissent. Design exigeant, résultats mesurables. Parlons de votre projet." />
  <meta name="robots" content="index, follow">

  <!-- LCP Image Preload: Absolute Top for Discovery -->
  <link rel="preload" as="image" href="/images/glot-pro.webp">
  <link rel="preload" as="image" href="/images/softkits.webp">

  <style>
    :root {
      --sec-a: #FFFFFF;
      --sec-b: #F2F2F5;
      --fg: #0A0A0A;
      --border: rgba(0, 0, 0, 0.08);
      --card: rgba(0, 0, 0, 0.03);
      --glass-nav: rgba(255, 255, 255, 0.82);
    }

    [data-theme="dark"] {
      --sec-a: #0A0A0A;
      --sec-b: #131315;
      --fg: #F5F5F7;
    }

    body {
      background-color: var(--sec-a);
      color: var(--fg);
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      overflow-x: hidden;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>

  <!-- Fonts: Preconnect and Optimized Load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
</head>

<body>
  <!-- SEO H1 - Visually hidden -->
  <h1 class="visually-hidden">
    Création de site web professionnel — Agence web Bénin & francophone</h1>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
